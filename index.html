<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GHOST LAUNCHER | v1.0.0</title>
    <style>
        :root {
            --ghost-purple: #9d4edd;
            --ghost-glow: #c8b6ff;
            --dark-bg: #0d0d12;
            --accent-green: #38ef7d;
            --glass: rgba(20, 20, 30, 0.85);
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--dark-bg);
            color: white; overflow: hidden;
        }

        /* --- 1. SEQUENTIAL LOADING SCREEN --- */
        #loading-screen {
            position: fixed; inset: 0;
            background: radial-gradient(circle, #1a0b2e 0%, #050505 100%);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 999; transition: 0.8s ease-in-out;
        }

        .pulse-logo {
            width: 180px;
            filter: drop-shadow(0 0 15px var(--ghost-purple));
            animation: ghostPulse 1.5s infinite;
        }

        @keyframes ghostPulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 5px var(--ghost-purple)); }
            50% { transform: scale(1.08); filter: drop-shadow(0 0 25px var(--ghost-glow)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 5px var(--ghost-purple)); }
        }

        /* --- 2. LOGIN SCREEN --- */
        #login-screen {
            display: none; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://i.imgur.com/3YpQ6eY.jpg');
            background-size: cover; justify-content: center; align-items: center;
        }

        .login-card {
            background: var(--glass);
            padding: 40px; border-radius: 20px;
            border: 1px solid var(--ghost-purple);
            text-align: center; backdrop-filter: blur(10px);
            box-shadow: 0 0 40px rgba(157, 78, 221, 0.2);
        }

        .login-card input {
            width: 280px; padding: 12px; margin: 15px 0;
            background: #000; border: 1px solid #444;
            color: white; border-radius: 5px; outline: none;
        }

        .login-card input:focus { border-color: var(--ghost-purple); }

        .btn {
            width: 100%; padding: 12px; margin: 5px 0;
            border-radius: 5px; border: none; cursor: pointer;
            font-weight: bold; transition: 0.3s;
        }

        .btn-local { background: var(--ghost-purple); color: white; }
        .btn-ely { background: #2d6cdf; color: white; }

        /* --- 3. MAIN DASHBOARD --- */
        #dashboard {
            display: none; height: 100%;
            background: url('https://i.imgur.com/3YpQ6eY.jpg') no-repeat center;
            background-size: cover; flex-direction: column;
        }

        /* Sidebar Navigation */
        .sidebar {
            position: absolute; left: 15px; top: 100px;
            width: 60px; background: rgba(0,0,0,0.6);
            border: 1px solid var(--ghost-purple);
            border-radius: 15px; display: flex; flex-direction: column;
            align-items: center; padding: 15px 0; gap: 20px;
        }

        .side-icon { width: 30px; opacity: 0.6; cursor: pointer; transition: 0.3s; }
        .side-icon:hover { opacity: 1; transform: scale(1.1); }

        /* Top Nav */
        header {
            display: flex; justify-content: space-between;
            padding: 15px 40px; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
        }

        .user-pill {
            display: flex; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.1);
            padding: 5px 15px; border-radius: 20px;
        }

        /* Play Section */
        .play-area {
            flex-grow: 1; display: flex;
            justify-content: center; align-items: center;
        }

        .center-ui {
            background: rgba(0,0,0,0.6);
            padding: 40px 60px; border-radius: 25px;
            border: 1px solid var(--ghost-purple);
            text-align: center; backdrop-filter: blur(8px);
        }

        .version-dropdown {
            background: #111; color: white;
            border: 1px solid var(--ghost-purple);
            padding: 8px 20px; border-radius: 5px;
            margin-bottom: 20px; width: 100%;
        }

        .play-btn {
            background: linear-gradient(to right, #11998e, #38ef7d);
            color: white; font-size: 2.5rem; font-weight: 900;
            padding: 15px 100px; border-radius: 12px;
            border: none; cursor: pointer;
            box-shadow: 0 0 25px rgba(56, 239, 125, 0.4);
            transition: 0.2s;
        }

        .play-btn:hover { transform: scale(1.05); filter: brightness(1.1); }

        /* Bottom Update Bar */
        .status-bar {
            background: rgba(0,0,0,0.8);
            padding: 10px 40px; border-top: 1px solid #333;
            display: flex; justify-content: space-between; font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <img src="63650.png" class="pulse-logo" alt="Ghost Logo">
        <h1 style="letter-spacing: 10px; margin-top: 20px;">GHOST</h1>
        <p style="color: var(--ghost-purple);">Initializing Modules...</p>
    </div>

    <div id="login-screen">
        <div class="login-card">
            <img src="63650.png" width="70" alt="Ghost Logo">
            <h2>GHOST LAUNCHER</h2>
            <input type="text" id="userInput" placeholder="Local Username" autocomplete="off">
            <button class="btn btn-local" onclick="handleLogin('Local')">Login as Local Account</button>
            <button class="btn btn-ely" onclick="handleLogin('Ely.by')">Ely.by Account</button>
        </div>
    </div>

    <div id="dashboard">
        <header>
            <div style="font-weight: bold; font-size: 1.2rem;">GHOST_LAUNCHER</div>
            <div style="display:flex; gap: 20px;">
                <span>Home</span> <span>Servers</span> <span>Settings</span>
            </div>
            <div class="user-pill">
                <span id="playerName">Devil</span>
                <img src="63650.png" width="25" style="border-radius: 50%;">
            </div>
        </header>

        <div class="sidebar">
            <div class="side-icon">📂</div>
            <div class="side-icon">🛠️</div>
            <div class="side-icon">🎨</div>
            <div class="side-icon">❓</div>
        </div>

        <div class="play-area">
            <div class="center-ui">
                <div style="margin-bottom: 10px; opacity: 0.7;">Minecraft Version</div>
                <select class="version-dropdown">
                    <option>1.20.1 (Indian Selective)</option>
                    <option>1.19.4</option>
                    <option>1.16.5 (Optifine)</option>
                    <option>1.8.9 (PvP Pack)</option>
                </select>
                <br>
                <button class="play-btn" onclick="startMinecraft()">PLAY</button>
            </div>
        </div>

        <div class="status-bar">
            <div>Update Logs: <span style="color: var(--ghost-purple);">v1.0.0-Stable</span></div>
            <div>Status: <span style="color: var(--accent-green);">Ready to Play</span></div>
        </div>
    </div>

    <script>
        // Start Loading Logic
        window.onload = () => {
            setTimeout(() => {
                const loader = document.getElementById('loading-screen');
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                    document.getElementById('login-screen').style.display = 'flex';
                }, 800);
            }, 3000); // 3-second pulse animation
        };

        // Login Logic
        function handleLogin(type) {
            const user = document.getElementById('userInput').value;
            if (type === 'Local' && user.trim() === "") {
                alert("Please enter a username for your local account.");
                return;
            }
            
            document.getElementById('playerName').innerText = type === 'Local' ? user : "Ely_User";
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'flex';
        }

        // Play Button Logic
        function startMinecraft() {
            const btn = document.querySelector('.play-btn');
            btn.innerHTML = "LAUNCHING...";
            btn.style.opacity = "0.6";
            btn.disabled = true;

            setTimeout(() => {
                alert("Minecraft is now starting! Enjoy your game.");
                btn.innerHTML = "PLAY";
                btn.style.opacity = "1";
                btn.disabled = false;
            }, 2500);
        }
    </script>
</body>
</html>
